<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/svg+xml" href="/charleston-favicon.svg">
<title>Invoice — Charleston</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,500&family=Inter:wght@300;400;500;600&family=Yellowtail&display=swap" rel="stylesheet">
<style>
:root{--logo:#2e5d3f;--logo-2:#3f6b4d;--gold:#C9A227;--gold-dk:#8A6D14;--ink:#22301F;--stone:#5D6656;--edge:#E3D6B4;--cream:#FFFDF6;
--stripe-a:#FDF6D8;--stripe-b:#FCE44D;--display:'Playfair Display',Georgia,serif;--body:'Inter',system-ui,sans-serif}
*{box-sizing:border-box;margin:0}
body{font-family:var(--body);font-weight:300;color:var(--ink);min-height:100vh;padding:26px 16px 60px;background:var(--stripe-a)}
.scene{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.scene .st{position:absolute;inset:0;background:repeating-linear-gradient(90deg,var(--stripe-a) 0 30px,var(--stripe-b) 30px 60px);opacity:.9}
.scene .wash{position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.5),rgba(255,253,244,.5) 40%,rgba(255,253,244,.62))}
.paper{position:relative;z-index:1;max-width:560px;margin:0 auto;background:var(--cream);border:1px solid rgba(201,162,39,.4);border-radius:18px;
box-shadow:0 30px 66px rgba(59,92,65,.22);padding:34px 30px 30px}
.head{display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--edge);padding-bottom:18px;margin-bottom:18px}
.head img.logo{width:60px;height:60px;border-radius:12px;object-fit:cover;flex:none}
.head .biz{font-family:var(--display);font-size:1.5rem;color:var(--logo);font-weight:600;line-height:1.1}
.head .rt{margin-left:auto;text-align:right}
.head .rt .lbl{font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-dk);font-weight:600}
.head .rt .num{font-family:var(--display);font-size:1.15rem;color:var(--ink);font-weight:600}
.billed{color:var(--stone);font-size:.92rem;margin-bottom:16px}
.billed b{color:var(--ink);font-weight:600}
table{width:100%;border-collapse:collapse;margin-bottom:6px}
td{padding:10px 0;border-bottom:1px solid #EFE7CC;font-size:.96rem;vertical-align:top}
td.amt{text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
.tot{display:flex;justify-content:space-between;align-items:baseline;padding-top:14px;margin-top:4px}
.tot .l{font-family:var(--display);font-size:1.2rem;color:var(--logo)}
.tot .v{font-family:var(--display);font-size:2rem;font-weight:600;color:var(--logo)}
.due{color:var(--stone);font-size:.86rem;text-align:right;margin-top:2px}
.notes{margin-top:16px;padding:12px 14px;background:#FBF6E4;border-radius:10px;color:var(--stone);font-size:.9rem;line-height:1.55;white-space:pre-wrap}
.pay{margin-top:24px}
.paybtn{display:block;width:100%;padding:16px;border:none;border-radius:12px;cursor:pointer;text-align:center;
background:linear-gradient(180deg,#C24E32,#98371F);color:#FFF7EE;font-weight:700;font-size:1.05rem;box-shadow:0 10px 24px rgba(152,55,31,.32)}
.paybtn:disabled{opacity:.6}
.paidstamp{margin-top:22px;text-align:center;padding:18px;border:2px solid var(--logo);border-radius:14px;background:#EAF2EA}
.paidstamp .big{font-family:var(--display);font-size:1.7rem;color:var(--logo);font-weight:600}
.paidstamp .sm{color:var(--stone);font-size:.86rem;margin-top:2px}
.manual{margin-top:16px;color:var(--stone);font-size:.88rem;text-align:center;line-height:1.5}
.foot{text-align:center;color:var(--stone);font-size:.74rem;margin-top:22px;opacity:.8}
.secure{text-align:center;color:var(--stone);font-size:.76rem;margin-top:10px}
.loading{text-align:center;color:var(--stone);padding:40px}
</style></head><body>
<div class="scene"><div class="st"></div><div class="wash"></div></div>
<div class="paper" id="paper"><div class="loading" id="loading">Loading your invoice…</div></div>
<script>
var token=location.pathname.split('/').filter(Boolean).pop();
var fmt=function(c){return '$'+(c/100).toFixed(2)};
var esc=function(s){return (s||'').replace(/[&<>"]/g,function(m){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]})};
var paidJustNow=new URLSearchParams(location.search).get('paid');

async function render(){
  var r,d;
  try{ r=await fetch('/api/pi/'+encodeURIComponent(token)); d=await r.json(); }catch(e){ d={ok:false}; }
  var P=document.getElementById('paper');
  if(!d||!d.ok){ P.innerHTML='<div class="loading">Sorry — this invoice link is not valid.</div>'; return; }
  var s=d.studio||{};
  var logo=s.logo?'<img class="logo" src="'+esc(s.logo)+'" alt="">':'';
  var biz=esc(s.name||'Charleston');
  var items=(d.items||[]).map(function(i){return '<tr><td>'+esc(i.desc||'Item')+'</td><td class="amt">'+fmt(i.amount)+'</td></tr>';}).join('');
  var due=d.amount-(d.paidTotal||0);
  var html=''+
    '<div class="head">'+logo+'<div class="biz">'+biz+'</div>'+
      '<div class="rt"><div class="lbl">Invoice</div><div class="num">'+esc(d.number)+'</div></div></div>'+
    (d.customer&&d.customer.name?'<div class="billed">Billed to <b>'+esc(d.customer.name)+'</b></div>':'')+
    '<table>'+items+'</table>'+
    '<div class="tot"><span class="l">Total</span><span class="v">'+fmt(d.amount)+'</span></div>'+
    (d.dueDate?'<div class="due">Due '+esc(d.dueDate)+'</div>':'')+
    (d.notes?'<div class="notes">'+esc(d.notes)+'</div>':'');

  if(d.status==='paid'){
    html+='<div class="paidstamp"><div class="big">Paid — thank you!</div>'+(d.paidAt?'<div class="sm">'+new Date(d.paidAt).toLocaleDateString()+'</div>':'')+'</div>';
  } else {
    if(d.paidTotal>0) html+='<div class="due" style="margin-top:10px">'+fmt(d.paidTotal)+' paid · <b>'+fmt(due)+' remaining</b></div>';
    if(d.canPay){
      html+='<div class="pay"><button class="paybtn" id="pay">Pay '+fmt(due)+' by card</button><div class="secure">Secure payment powered by Stripe</div></div>';
    } else {
      html+='<div class="manual">Please contact '+biz+' to arrange payment.</div>';
    }
  }
  html+='<div class="foot">Powered by Charleston</div>';
  P.innerHTML=html;
  var pb=document.getElementById('pay');
  if(pb) pb.onclick=async function(){
    pb.disabled=true;pb.textContent='Redirecting to secure checkout…';
    try{
      var rr=await fetch('/api/pi/'+encodeURIComponent(token)+'/checkout',{method:'POST'});
      var dd=await rr.json();
      if(dd.ok&&dd.url){ location.href=dd.url; return; }
      throw new Error(dd.error||'Could not start payment.');
    }catch(e){ pb.disabled=false;pb.textContent='Pay '+fmt(due)+' by card'; alert(e.message); }
  };
}
render();
</script>
</body></html>
