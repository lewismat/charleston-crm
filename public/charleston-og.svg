    <circle cx="120" cy="120" r="92" fill="#f6f3e2"></circle>
    <circle cx="120" cy="120" r="86" fill="none" stroke="#2e5d3f" stroke-width="2.5"></circle>
    <circle cx="120" cy="120" r="83" fill="url(#chStripes)"></circle>
    <text x="120" y="112" text-anchor="middle" font-family="Caladea, Georgia, serif" font-style="italic" font-weight="700" font-size="34" fill="#2e5d3f">Charleston</text>
    <line x1="52" y1="140" x2="66" y2="140" stroke="#7a9576" stroke-width="1.4"></line>
    <line x1="174" y1="140" x2="188" y2="140" stroke="#7a9576" stroke-width="1.4"></line>
