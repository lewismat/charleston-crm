<!doctype html><html lang="en"><head>
<link rel="icon" type="image/svg+xml" href="/charleston-favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Yellowtail&amp;display=swap" rel="stylesheet">
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Your account — Charleston</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--logo:#3B5C41;--logo-2:#4A6E50;--logo-dk:#2C4630;--gold:#C9A227;--gold-dp:#9A7A22;
--stripe-a:#FDF6D8;--stripe-b:#FCE44D;--ivory:#FFFDF4;--parchment:#FBF6E4;--ink:#22301F;--stone:#6A7566;
--display:'Playfair Display',Georgia,serif;--body:'Inter',system-ui,sans-serif;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--body);font-weight:300;color:var(--ink);min-height:100vh;padding:36px 18px;
background:repeating-linear-gradient(90deg,var(--stripe-a) 0 30px,var(--stripe-b) 30px 60px)}
.wrap{max-width:560px;margin:0 auto}
.brand{text-align:center;font-family:var(--display);font-size:1.5rem;letter-spacing:.14em;text-transform:uppercase;color:var(--logo);font-weight:600;margin-bottom:6px}
h1{font-family:var(--display);font-style:italic;font-weight:500;font-size:1.7rem;color:var(--logo);text-align:center;margin-bottom:22px}
.panel{background:linear-gradient(180deg,#fff,var(--ivory) 30%,var(--parchment));border:1px solid rgba(201,162,39,.4);border-radius:14px;padding:26px;margin-bottom:16px;box-shadow:0 2px 0 rgba(255,255,255,.9) inset,0 16px 34px rgba(59,92,65,.12)}
h2{font-family:var(--display);font-size:1.25rem;color:var(--logo);margin-bottom:10px}
.status{display:inline-block;padding:5px 14px;border-radius:999px;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;font-weight:600}
.status.active{background:#E6EDE5;color:var(--logo)}.status.none,.status.past_due,.status.canceled{background:#F6E2D8;color:#8C3F1E}
.row{font-size:.92rem;color:var(--stone);margin:8px 0}
.btn{padding:12px 22px;border:none;border-radius:4px;cursor:pointer;font-size:.85rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#FFFDF4;
background:linear-gradient(180deg,var(--logo-2),var(--logo) 46%,var(--logo-dk));box-shadow:0 8px 20px rgba(59,92,65,.28);margin-top:12px}
.btn.ghost{background:transparent;color:var(--logo);border:1px solid var(--gold-dp);box-shadow:none}
.links{text-align:center;margin-top:8px}.links a{color:var(--gold-dp);font-size:.88rem;font-weight:500;margin:0 10px}
.msg{font-size:.85rem;margin-top:10px;min-height:1em}.msg.err{color:#8C3F1E}
</style></head><body>
<div class="wrap">
  <div class="brand">Charleston</div>
  <h1>Your account</h1>
  <div class="panel">
    <h2>Subscription</h2>
    <div id="subwrap">Loading…</div>
  </div>
  <div class="panel">
    <h2>Profile</h2>
    <div class="row" id="who">—</div>
    <a class="btn ghost" href="/settings">Studio settings</a>
  </div>
  <div class="card" style="margin-top:16px">
    <h2 style="font-family:'Cormorant Garamond',Georgia,serif;color:#2e5d3f;font-size:1.4rem;margin:0 0 4px">Refer a teacher</h2>
    <p class="row" style="color:#5D6656;font-size:.9rem">Give a month, get a month — share your link. When a studio you refer subscribes, you both get a free month.</p>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px">
      <code id="ref_link" style="background:#00000010;padding:8px 11px;border-radius:8px;font-size:.85rem;word-break:break-all;flex:1">—</code>
      <button class="btn" id="ref_copy" style="margin:0">Copy</button>
    </div>
    <p class="row" id="ref_count" style="color:#9aa08e;font-size:.85rem;margin-top:8px"></p>
  </div>
  <div class="links"><a href="/dashboard">← Back to dashboard</a><a href="#" id="out">Sign out</a></div>
</div>
<script>
var $=function(id){return document.getElementById(id)};
(async function(){
  var st=await fetch('/api/auth/state').then(function(r){return r.json()});
  if(!st.authed){location.href='/login';return;}
  $('who').textContent=(st.user&&st.user.name?st.user.name:'')+' · signed in';
  var b=await fetch('/api/billing/status').then(function(r){return r.json()});
  var s=b.status||'none';
  var end=b.periodEnd?new Date(b.periodEnd).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}):'';
  var html='<span class="status '+s+'">'+(b.active?'Active':s)+'</span>';
  if(b.active&&end) html+='<div class="row">Renews '+end+'</div>';
  if(b.active){
    html+='<button class="btn" id="manage">Manage or cancel</button>';
  } else {
    html+='<div class="row">You don’t have an active subscription.</div><button class="btn" id="start">Start 14-day free trial — then $9.99/mo</button>';
  }
  $('subwrap').innerHTML=html+'<p class="msg" id="m"></p>';
  var mg=$('manage'); if(mg) mg.onclick=async function(){
    $('m').textContent='Opening billing…';
    var d=await fetch('/api/billing/portal',{method:'POST'}).then(function(r){return r.json()});
    if(d.ok&&d.url)location.href=d.url; else {$('m').className='msg err';$('m').textContent=d.error||'Could not open billing.';}
  };
  var stt=$('start'); if(stt) stt.onclick=function(){location.href='/subscribe';};
})();
$('out').addEventListener('click',function(e){e.preventDefault();fetch('/api/auth/logout',{method:'POST'}).then(function(){location.href='/login';});});
</script><script>
(function(){
  fetch('/api/referrals').then(function(r){return r.json();}).then(function(d){
    if(!d||!d.ok||!d.slug)return;
    var url=location.origin+'/?ref='+encodeURIComponent(d.slug);
    var l=document.getElementById('ref_link'); if(l)l.textContent=url;
    var c=document.getElementById('ref_count'); if(c)c.textContent=d.count?('You\'ve referred '+d.count+' studio'+(d.count===1?'':'s')+'. Thank you!'):'No referrals yet — share your link!';
    var b=document.getElementById('ref_copy'); if(b)b.addEventListener('click',function(){navigator.clipboard.writeText(url).then(function(){b.textContent='Copied!';setTimeout(function(){b.textContent='Copy';},1500);});});
  }).catch(function(){});
})();
</script></body></html>
