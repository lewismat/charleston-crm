<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/svg+xml" href="/charleston-favicon.svg">
<title>Announcements — Charleston</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Karla:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--logo:#2e5d3f;--cream:#f6f3e2;--ink:#22301F;--stone:#5D6656;--edge:#DED3B4;--gold:#C9A24B}
*{box-sizing:border-box;margin:0}body{font-family:'Karla',system-ui,sans-serif;font-weight:300;color:var(--ink);background:#FBF8EF;min-height:100vh}
.tbmnav{background:#2e5d3f;color:#F7F2E4;display:flex;align-items:center;gap:16px;padding:11px 20px;flex-wrap:wrap}
.tbmnav .brand{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1.15rem;margin-right:auto;display:flex;align-items:center}
.tbmnav a{color:#F7F2E4;text-decoration:none;font-size:.85rem;font-weight:500;opacity:.9;cursor:pointer}
.tbmnav a:hover{opacity:1}.tbmnav a.active{color:#C9A24B;opacity:1;font-weight:700}
.wrap{max-width:640px;margin:0 auto;padding:30px 20px 80px}
h1{font-family:'Cormorant Garamond',serif;color:var(--logo);font-size:2.1rem;font-weight:700}
.sub{color:var(--stone);margin:2px 0 22px}
.card{background:#fff;border:1px solid var(--edge);border-radius:14px;padding:22px;box-shadow:0 8px 22px rgba(46,93,63,.07)}
label{display:block;font-weight:700;color:var(--logo);margin:14px 0 5px;font-size:.9rem}
select,input,textarea{width:100%;padding:11px 13px;border:1px solid var(--edge);border-radius:10px;background:#fff;font-family:inherit;font-size:.98rem;color:var(--ink)}
textarea{min-height:130px;resize:vertical}
.rowck{display:flex;gap:18px;margin-top:14px;flex-wrap:wrap}
.rowck label{display:flex;align-items:center;gap:8px;margin:0;font-weight:600;color:var(--ink)}
.rowck input{width:18px;height:18px}
.send{margin-top:20px;padding:12px 26px;border:none;border-radius:10px;background:var(--logo);color:var(--cream);font-weight:700;font-size:1rem;cursor:pointer}
.msg{margin-top:14px;font-size:.92rem;min-height:1.2em}
.msg.ok{color:var(--logo)}.msg.err{color:#8C3F1E}
.hint{color:var(--stone);font-size:.82rem;margin-top:4px}
</style></head><body>
<div class="tbmnav"><span class="brand"><img src="/charleston-icon.svg" alt="" style="height:24px;width:24px;vertical-align:-6px;margin-right:7px">Charleston</span><a href="/dashboard">Dashboard</a><a href="/schedule">Scheduling</a><a href="/students">Students</a><a href="/inquiries">Inquiries</a><a href="/announce" class="active">Announce</a><a href="/settings">Settings</a><a id="tbmLogout" aria-label="Log out">Log out</a></div>
<div class="wrap">
  <h1>Announcements</h1>
  <p class="sub">Send a message to your students by email and text — everyone, a group, or one class.</p>
  <div class="card">
    <label for="aud">Send to</label>
    <select id="aud">
      <option value="all">All students &amp; leads</option>
      <option value="students">Students only</option>
      <option value="leads">Leads only</option>
    </select>
    <label for="subj">Subject <span class="hint" style="font-weight:400">(for email)</span></label>
    <input id="subj" placeholder="e.g. This Saturday's class is full">
    <label for="body">Message</label>
    <textarea id="body" placeholder="Write your announcement…"></textarea>
    <div class="rowck">
      <label><input type="checkbox" id="ch_email" checked> Email</label>
      <label><input type="checkbox" id="ch_sms"> Text message</label>
    </div>
    <button class="send" id="send">Send announcement</button>
    <div class="msg" id="msg"></div>
  </div>
</div>
<script src="/sidebar.js"></script>
<script src="/branding.js"></script>
<script>
var $=function(i){return document.getElementById(i);};
fetch('/api/admin/upcoming').then(function(r){return r.json();}).then(function(d){
  if(!d||!d.ok||!d.slots)return;
  var sel=$('aud'); var LBL={private_lesson:'Private lesson',group_class:'Group class',private_party:'Private party'};
  d.slots.forEach(function(s){
    var when=''; try{when=new Date(s.starts_at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});}catch(e){}
    var o=document.createElement('option'); o.value='slot:'+s.id; o.textContent='Class · '+(s.title||LBL[s.slot_type]||'Session')+' · '+when;
    sel.appendChild(o);
  });
}).catch(function(){});
$('send').addEventListener('click',function(){
  var m=$('msg'); m.className='msg'; m.textContent='Sending…'; $('send').disabled=true;
  fetch('/api/admin/announce',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    audience:$('aud').value, subject:$('subj').value, message:$('body').value,
    email:$('ch_email').checked, sms:$('ch_sms').checked
  })}).then(function(r){return r.json();}).then(function(x){
    if(x&&x.ok){
      if(x.recipients===0){ m.className='msg err'; m.textContent='No matching students to message yet.'; }
      else if($('ch_email').checked && x.emailed===0 && !x.texted){ m.className='msg err'; m.innerHTML='Reached '+x.recipients+' people, but email isn\'t set up yet — turn it on in <a href="/settings">Settings</a> to actually send.'; }
      else { m.className='msg ok'; m.textContent='Sent to '+x.recipients+' — '+x.emailed+' emailed'+(x.texted?(', '+x.texted+' texted'):'')+'.'; $('body').value=''; }
    }
    else { m.className='msg err'; m.textContent=(x&&x.error)||'Could not send.'; }
  }).catch(function(){ m.className='msg err'; m.textContent='Could not send.'; })
  .finally?null:0;
  Promise.resolve().then(function(){});
  setTimeout(function(){$('send').disabled=false;},1200);
});
</script>
</body></html>
