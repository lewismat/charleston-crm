<!doctype html><html lang="en"><head>
<link rel="icon" type="image/svg+xml" href="/charleston-favicon.svg">
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Create your account — Charleston</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--logo:#3B5C41;--logo-2:#4A6E50;--logo-dk:#2C4630;--gold:#C9A227;--gold-dp:#9A7A22;
--stripe-a:#FDF6D8;--stripe-b:#FCE44D;--ivory:#FFFDF4;--parchment:#FBF6E4;--ink:#22301F;--stone:#6A7566;
--display:'Playfair Display',Georgia,serif;--body:'Inter',system-ui,sans-serif;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--body);font-weight:300;color:var(--ink);min-height:100vh;
display:flex;align-items:center;justify-content:center;padding:28px 18px;background:var(--stripe-a)}
.scene{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.scene .stripes{position:absolute;inset:0;
background:repeating-linear-gradient(90deg,var(--stripe-a) 0 30px,var(--stripe-b) 30px 60px);opacity:.95}
.scene .wash{position:absolute;inset:0;background:
linear-gradient(180deg,rgba(255,255,255,.42) 0%,rgba(255,255,255,0) 22%),
linear-gradient(180deg,rgba(255,253,244,.58),rgba(255,253,244,.46) 40%,rgba(255,253,244,.62))}
@media(max-width:520px){.scene .stripes{background:repeating-linear-gradient(90deg,var(--stripe-a) 0 20px,var(--stripe-b) 20px 40px)}}
.card{position:relative;z-index:1;width:100%;max-width:432px;
background:linear-gradient(168deg,#fff,var(--ivory) 26%,var(--parchment));
border-radius:16px;padding:40px 38px;
box-shadow:0 2px 0 rgba(255,255,255,.9) inset,0 30px 66px rgba(59,92,65,.22);border:1px solid rgba(201,162,39,.4)}
.logo{display:block;margin:0 auto 12px;width:104px;height:104px;filter:drop-shadow(0 8px 16px rgba(59,92,65,.22))}
h1{font-family:var(--display);font-style:italic;font-weight:500;font-size:1.75rem;color:var(--logo);text-align:center;margin:2px 0 4px}
.sub{text-align:center;color:var(--stone);font-size:.92rem;margin-bottom:8px}
.trialpill{display:block;width:max-content;margin:0 auto 22px;padding:5px 15px;border-radius:999px;
background:linear-gradient(180deg,#FDFBF2,#F6F0DD);border:1px solid rgba(201,162,39,.5);
color:var(--gold-dp);font-size:.74rem;font-weight:600;letter-spacing:.06em}
label{display:block;font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-dp);font-weight:600;margin:14px 0 5px}
input{width:100%;padding:12px 14px;border:1px solid #E3D6B4;border-radius:9px;background:#FEFCF6;font:inherit;font-size:16px;color:var(--ink)}
input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,162,39,.16)}
.btn{width:100%;margin-top:22px;padding:15px;border:none;border-radius:6px;cursor:pointer;
font-size:.9rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:#FFFDF4;
background:linear-gradient(180deg,var(--logo-2),var(--logo) 46%,var(--logo-dk));box-shadow:0 10px 24px rgba(59,92,65,.3)}
.btn:hover{filter:brightness(1.05)}.btn:disabled{opacity:.6;cursor:default}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0 4px;color:#9a9a86;font-size:.78rem}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,transparent,#DED3B4,transparent)}
.gbtn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;margin-top:12px;padding:12px;
border:1px solid #DED3B4;border-radius:10px;background:#fff;color:#3c4a34;text-decoration:none;font-weight:600;font-size:.92rem;cursor:pointer}
.gbtn:hover{background:#FCFAF2;border-color:#C9A227}
.foot{text-align:center;margin-top:20px;font-size:.88rem;color:var(--stone)}
.foot a{color:var(--gold-dp);font-weight:600}
.fine{font-size:.76rem;color:#5f6b58;margin-top:12px;text-align:center}
.fine a{color:var(--gold-dp)}
.msg{margin-top:14px;font-size:.86rem;text-align:center;min-height:1.2em}
.msg.err{color:#8C3F1E}.msg.info{color:var(--gold-dp)}
</style></head><body>
<div class="scene"><div class="stripes"></div><div class="wash"></div></div>
<form class="card" id="f" novalidate>
  <img class="logo" src="/charleston-badge.svg" alt="Charleston">
  <h1>Create your studio</h1>
  <p class="sub">One calm home for bookings, students, and payments.</p>
  <span class="trialpill">14 days free · then $9.99/mo · cancel anytime</span>

  <label for="name">Your name</label><input id="name" autocomplete="name">
  <label for="email">Email</label><input id="email" type="email" autocomplete="email">
  <label for="password">Password</label><input id="password" type="password" autocomplete="new-password" placeholder="At least 8 characters">
  <button class="btn" id="go" type="submit">Start free trial</button>
  <p class="msg" id="msg"></p>

  <div class="divider">or</div>
  <a class="gbtn" href="/api/auth/google">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.6l6.8-6.8C35.6 2.4 30.1 0 24 0 14.6 0 6.4 5.4 2.5 13.3l7.9 6.1C12.3 13.2 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.4c-.5 2.9-2.1 5.3-4.6 6.9l7.1 5.5c4.1-3.8 6.5-9.4 6.5-16.9z"/><path fill="#FBBC05" d="M10.4 28.6c-.5-1.4-.8-2.9-.8-4.6s.3-3.2.8-4.6l-7.9-6.1C.9 16.1 0 19.9 0 24s.9 7.9 2.5 11.3l7.9-6.7z"/><path fill="#34A853" d="M24 48c6.1 0 11.3-2 15-5.5l-7.1-5.5c-2 1.3-4.6 2.1-7.9 2.1-6.3 0-11.7-3.7-13.6-9.1l-7.9 6.7C6.4 42.6 14.6 48 24 48z"/></svg>
    Continue with Google
  </a>

  <p class="fine">By creating an account you agree to our <a href="/terms.html">Terms</a> and <a href="/privacy.html">Privacy Policy</a>.</p>
  <p class="foot">Already have an account? <a href="/login">Sign in</a></p>
</form>
<script>
var $=function(id){return document.getElementById(id)};
if(new URLSearchParams(location.search).get('googleoff')){
  var m0=$('msg');m0.className='msg info';m0.textContent='Google sign-in isn’t switched on yet — please use email and password for now.';
}
$('f').addEventListener('submit',async function(e){
  e.preventDefault();
  var m=$('msg');m.className='msg';m.textContent='';
  var name=$('name').value.trim(),email=$('email').value.trim(),pw=$('password').value;
  if(!name||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)||pw.length<8){
    m.className='msg err';m.textContent='Add your name, a valid email, and an 8+ character password.';return;}
  $('go').disabled=true;$('go').textContent='Creating…';
  try{
    var r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:name,email:email,password:pw, ref:(new URLSearchParams(location.search).get("ref")||(document.cookie.match(/(?:^|; )cc_ref=([^;]+)/)||[])[1]||"")})});
    var d=await r.json();
    if(!d.ok)throw new Error(d.error||'Could not create account.');
    location.href=d.next||'/subscribe';
  }catch(err){m.className='msg err';m.textContent=err.message;$('go').disabled=false;$('go').textContent='Start free trial';}
});
</script></body></html>
